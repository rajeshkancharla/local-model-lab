# Phase 3 comparison prompt set — 40 prompts across 7 categories
# Each prompt has expected_keywords for relevance scoring and min_length
# for completeness scoring.

# ── FACTUAL RECALL (6) ────────────────────────────────────────────────────────

- id: fact_001
  category: factual_recall
  text: "Explain the difference between TCP and UDP protocols. Cover reliability, connection state, and typical use cases."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["tcp", "udp", "reliable", "connection", "stateless", "packet", "handshake"]
  min_length: 150

- id: fact_002
  category: factual_recall
  text: "Explain the CAP theorem in distributed systems. What are the three properties and why can you only guarantee two at once?"
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["consistency", "availability", "partition", "tolerance", "distributed", "trade-off"]
  min_length: 150

- id: fact_003
  category: factual_recall
  text: "What is gradient descent and how does it work? Explain learning rate, loss function, and when it might fail to converge."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["gradient", "loss", "learning rate", "optimization", "weights", "minimum"]
  min_length: 180

- id: fact_004
  category: factual_recall
  text: "How does a hash table work? Explain hashing, collision resolution strategies, and average time complexity for insert and lookup."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["hash", "collision", "key", "value", "bucket", "lookup", "time complexity"]
  min_length: 180

- id: fact_005
  category: factual_recall
  text: "What is Docker and how does it differ from a virtual machine? Cover containers, images, isolation, and resource overhead."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["container", "image", "kernel", "isolation", "overhead", "virtual machine"]
  min_length: 150

- id: fact_006
  category: factual_recall
  text: "What are the main differences between SQL and NoSQL databases? When would you choose one over the other?"
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["relational", "schema", "table", "document", "scale", "flexible", "join"]
  min_length: 150

# ── REASONING (6) ────────────────────────────────────────────────────────────

- id: reason_001
  category: reasoning
  text: "A bat and a ball cost $1.10 in total. The bat costs $1.00 more than the ball. How much does the ball cost? Show your reasoning."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["5 cents", "0.05", "ball", "bat", "dollar"]
  min_length: 80

- id: reason_002
  category: reasoning
  text: "You have 8 identical-looking balls but one is slightly heavier. Using a balance scale, what is the minimum number of weighings needed to identify the heavy ball? Explain your strategy."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["2", "weighing", "balance", "group", "heavy"]
  min_length: 100

- id: reason_003
  category: reasoning
  text: "A snail climbs a 10-metre pole. Each day it climbs 3 metres; each night it slides back 2 metres. How many days does it take to reach the top?"
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["8", "days", "climb", "slide", "net"]
  min_length: 60

- id: reason_004
  category: reasoning
  text: "All Bloops are Razzies. All Razzies are Lazzies. Are all Bloops definitely Lazzies? Explain your logical reasoning."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["yes", "lazzies", "bloops", "syllogism", "all", "transitive"]
  min_length: 60

- id: reason_005
  category: reasoning
  text: "Two trains start 300 miles apart and travel toward each other. Train A travels at 60 mph and Train B at 90 mph. How many hours until they meet? Show your working."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["2", "hours", "speed", "distance", "combined", "rate"]
  min_length: 80

- id: reason_006
  category: reasoning
  text: "If you flip a fair coin 3 times, what is the probability of getting at least 2 heads? List all outcomes and show your calculation."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["0.5", "50%", "4/8", "1/2", "outcomes", "probability", "heads"]
  min_length: 100

# ── SUMMARIZATION (5) ────────────────────────────────────────────────────────

- id: summ_001
  category: summarization
  text: "Summarize the key differences between supervised, unsupervised, and reinforcement learning. Include what kind of data each requires."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["supervised", "unsupervised", "reinforcement", "label", "reward", "cluster"]
  min_length: 150

- id: summ_002
  category: summarization
  text: "Summarize how HTTPS works. Cover TLS handshake, certificate verification, symmetric vs asymmetric encryption."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["tls", "ssl", "certificate", "handshake", "encrypt", "asymmetric", "symmetric"]
  min_length: 180

- id: summ_003
  category: summarization
  text: "Summarize the core principles of agile software development. Cover sprints, iterative delivery, and how it differs from waterfall."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["sprint", "iteration", "backlog", "scrum", "waterfall", "incremental", "stakeholder"]
  min_length: 150

- id: summ_004
  category: summarization
  text: "Summarize the SOLID principles of object-oriented design. Give a one-sentence explanation for each principle."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["single responsibility", "open", "closed", "liskov", "interface", "dependency", "solid"]
  min_length: 200

- id: summ_005
  category: summarization
  text: "Summarize the main differences between process-based and thread-based concurrency in Python. Mention the GIL."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["thread", "process", "gil", "global interpreter lock", "concurrent", "parallel", "multiprocessing"]
  min_length: 150

# ── CODE GENERATION (6) ──────────────────────────────────────────────────────

- id: code_001
  category: code_generation
  text: "Write a Python function that checks whether a given string is a palindrome. Handle case insensitivity and ignore spaces."
  expected_format: code
  difficulty: easy
  expected_keywords: ["def", "palindrome", "reverse", "lower", "return", "replace"]
  min_length: 100

- id: code_002
  category: code_generation
  text: "Implement a binary search function in Python. It should return the index of the target or -1 if not found."
  expected_format: code
  difficulty: easy
  expected_keywords: ["def", "binary", "mid", "left", "right", "return", "-1"]
  min_length: 100

- id: code_003
  category: code_generation
  text: "Write a Python function that takes a list of integers and returns all pairs that sum to a given target. Use a dictionary for O(n) complexity."
  expected_format: code
  difficulty: medium
  expected_keywords: ["def", "pairs", "target", "dict", "seen", "return", "append"]
  min_length: 120

- id: code_004
  category: code_generation
  text: "Write a Python function to merge two sorted lists into a single sorted list without using sort()."
  expected_format: code
  difficulty: easy
  expected_keywords: ["def", "merge", "while", "append", "pointer", "return", "sorted"]
  min_length: 120

- id: code_005
  category: code_generation
  text: "Implement a simple LRU (Least Recently Used) cache in Python that supports get(key) and put(key, value) with a fixed capacity."
  expected_format: code
  difficulty: hard
  expected_keywords: ["def", "lru", "cache", "capacity", "get", "put", "OrderedDict"]
  min_length: 200

- id: code_006
  category: code_generation
  text: "Write a Python context manager using the contextlib.contextmanager decorator that measures and prints the execution time of a code block."
  expected_format: code
  difficulty: medium
  expected_keywords: ["def", "contextmanager", "time", "yield", "elapsed", "print", "perf_counter"]
  min_length: 100

# ── CREATIVE WRITING (4) ─────────────────────────────────────────────────────

- id: creative_001
  category: creative_writing
  text: "Write a haiku (5-7-5 syllables) about software debugging."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["bug", "code", "error", "fix", "debug", "crash", "test"]
  min_length: 20

- id: creative_002
  category: creative_writing
  text: "Explain recursion using a 3-sentence story or metaphor that a 10-year-old could understand."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["itself", "base", "smaller", "function", "story", "stop"]
  min_length: 60

- id: creative_003
  category: creative_writing
  text: "Describe the concept of eventual consistency as a short (3-4 sentence) story about a library that has multiple branches."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["library", "eventually", "consistent", "update", "copy", "sync"]
  min_length: 80

- id: creative_004
  category: creative_writing
  text: "Write a short, humorous job posting for a 'Senior Bug Whisperer' position at a fictional tech company."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["requirements", "experience", "skills", "bugs", "position", "team"]
  min_length: 100

# ── MULTI-STEP INSTRUCTIONS (6) ──────────────────────────────────────────────

- id: multi_001
  category: multi_step
  text: "List the steps to set up a Python virtual environment, install dependencies from a requirements file, and verify the installation."
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["venv", "pip", "activate", "install", "requirements", "python"]
  min_length: 150

- id: multi_002
  category: multi_step
  text: "Describe step by step how to deploy a Python Flask application to a Linux server using Nginx as a reverse proxy and Gunicorn as the WSGI server."
  expected_format: free_text
  difficulty: hard
  expected_keywords: ["nginx", "gunicorn", "server", "port", "proxy", "deploy", "systemd"]
  min_length: 250

- id: multi_003
  category: multi_step
  text: "What steps would you take to debug a slow SQL query in a production database? Include query analysis, indexing, and query rewriting."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["explain", "index", "query plan", "join", "optimize", "slow", "execution"]
  min_length: 200

- id: multi_004
  category: multi_step
  text: "How would you investigate and fix a memory leak in a Python web application? List the diagnostic and remediation steps."
  expected_format: free_text
  difficulty: medium
  expected_keywords: ["profile", "memory", "gc", "reference", "monitor", "tracemalloc", "object"]
  min_length: 200

- id: multi_005
  category: multi_step
  text: "Describe the process you follow when conducting a code review. What specific things do you look for?"
  expected_format: free_text
  difficulty: easy
  expected_keywords: ["review", "logic", "tests", "security", "readability", "naming", "comment"]
  min_length: 180

- id: multi_006
  category: multi_step
  text: "What are the key steps to migrate a monolithic application to microservices? Cover decomposition strategy, data separation, and communication."
  expected_format: free_text
  difficulty: hard
  expected_keywords: ["service", "api", "database", "decompose", "communication", "bounded", "domain"]
  min_length: 250

# ── STRUCTURED OUTPUT (7) ────────────────────────────────────────────────────
# These prompts ask the model to return valid JSON directly.
# Quality scorer checks for valid, parseable JSON (format_compliance dimension).

- id: struct_001
  category: structured_output
  text: "Analyze the sentiment of this text and respond with ONLY a JSON object containing: sentiment (positive/negative/neutral), confidence (0.0-1.0), and key_phrases (list of strings). Text: 'The new API is incredibly fast and well-documented, though the pricing feels steep for small teams.'"
  expected_format: json
  difficulty: easy
  expected_keywords: ["sentiment", "confidence", "key_phrases", "positive", "negative"]
  min_length: 60

- id: struct_002
  category: structured_output
  text: "Extract named entities from this text and respond with ONLY a JSON object with an 'entities' array where each item has 'text', 'type' (person/organization/location/technology), and 'confidence' (0.0-1.0). Text: 'Linus Torvalds created Linux while studying at the University of Helsinki. The project is now maintained by the Linux Foundation.'"
  expected_format: json
  difficulty: medium
  expected_keywords: ["entities", "person", "organization", "location", "confidence", "text", "type"]
  min_length: 80

- id: struct_003
  category: structured_output
  text: "Summarize the following and respond with ONLY a JSON object with: title (string), key_points (list of 3-5 strings), and difficulty_level (beginner/intermediate/advanced). Text: 'Transformers use self-attention mechanisms to process sequences in parallel. Unlike RNNs, they have no recurrence, enabling massive parallelization during training. The attention scores determine how much each token influences every other token.'"
  expected_format: json
  difficulty: medium
  expected_keywords: ["title", "key_points", "difficulty_level", "attention", "transformer"]
  min_length: 80

- id: struct_004
  category: structured_output
  text: "Classify this support ticket and respond with ONLY a JSON object with: category (bug/feature/question/billing), priority (low/medium/high/critical), and summary (one sentence). Ticket: 'Users report getting a 500 error on the login page when resetting their password via Safari on iPhone 14. Affects roughly 30% of mobile users.'"
  expected_format: json
  difficulty: easy
  expected_keywords: ["category", "priority", "summary", "bug", "high", "critical"]
  min_length: 60

- id: struct_005
  category: structured_output
  text: "Answer this question and respond with ONLY a JSON object with: answer (string), confidence (low/medium/high), and reasoning (string). Question: What is the average time complexity of quicksort?"
  expected_format: json
  difficulty: easy
  expected_keywords: ["answer", "confidence", "reasoning", "O(n log n)", "average", "pivot"]
  min_length: 60

- id: struct_006
  category: structured_output
  text: "Extract performance metrics from this text and respond with ONLY a JSON object with: metrics (list of objects each having value, unit, and label), and summary (string). Text: 'Our service handles 15,000 requests per second at peak load. The p99 latency is 38ms and p50 is 12ms. We maintain 99.95% uptime with 3 nines of reliability.'"
  expected_format: json
  difficulty: medium
  expected_keywords: ["metrics", "value", "unit", "label", "summary", "requests", "latency"]
  min_length: 80

- id: struct_007
  category: structured_output
  text: "Create a recipe and respond with ONLY a JSON object with: name (string), ingredients (list of strings), steps (list of strings), and prep_time_minutes (integer). Recipe: a quick developer's energy smoothie."
  expected_format: json
  difficulty: easy
  expected_keywords: ["name", "ingredients", "steps", "prep_time_minutes", "banana", "coffee", "protein"]
  min_length: 80
